<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark" data-style="gemini">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FindDeep</title>
  <meta name="description" content="AI Assistant">
  <link rel="icon" href="https://www.gstatic.com/lamda/images/gemini_favicon_f069958c85030456e93de685481c559f160ea06b.png" type="image/png" id="favicon">
</head>
<body>
  <div id="app">
    <style>
      .app-loading-container {
        position: fixed; top: 0; left: 0; right: 0; bottom: 0;
        background-color: #131314;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        z-index: 99999;
      }
      .app-loading-spinner {
        width: 36px; height: 36px;
        border: 3px solid rgba(255, 255, 255, 0.08);
        border-radius: 50%;
        border-top-color: #8ab4f8;
        animation: app-spin 0.8s linear infinite;
        margin-bottom: 16px;
      }
      @keyframes app-spin {
        to { transform: rotate(360deg); }
      }
      .app-loading-text {
        color: #e8eaed;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        font-size: 13px; font-weight: 500; letter-spacing: 0.5px;
        opacity: 0.7;
        animation: pulse 2s ease-in-out infinite;
      }
      @keyframes pulse {
        0%, 100% { opacity: 0.5; }
        50% { opacity: 0.9; }
      }
    </style>
    <div class="app-loading-container">
      <div class="app-loading-spinner"></div>
      <div class="app-loading-text">FindDeep 正在启动 ...</div>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
