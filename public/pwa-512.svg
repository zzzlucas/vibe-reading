<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8ab4f8"/>
      <stop offset="100%" stop-color="#c084fc"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#8ab4f8" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#8ab4f8" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Glow -->
  <circle cx="256" cy="260" r="180" fill="url(#glow)"/>
  <!-- Book body -->
  <rect x="130" y="160" width="252" height="220" rx="12" fill="none" stroke="url(#accent)" stroke-width="8"/>
  <!-- Book spine -->
  <line x1="256" y1="160" x2="256" y2="380" stroke="url(#accent)" stroke-width="6" stroke-linecap="round"/>
  <!-- Left page lines -->
  <line x1="155" y1="210" x2="236" y2="210" stroke="#8ab4f8" stroke-width="4" stroke-linecap="round" opacity="0.6"/>
  <line x1="155" y1="235" x2="236" y2="235" stroke="#8ab4f8" stroke-width="4" stroke-linecap="round" opacity="0.6"/>
  <line x1="155" y1="260" x2="236" y2="260" stroke="#8ab4f8" stroke-width="4" stroke-linecap="round" opacity="0.6"/>
  <line x1="155" y1="285" x2="210" y2="285" stroke="#8ab4f8" stroke-width="4" stroke-linecap="round" opacity="0.6"/>
  <!-- Right page lines -->
  <line x1="276" y1="210" x2="357" y2="210" stroke="#c084fc" stroke-width="4" stroke-linecap="round" opacity="0.6"/>
  <line x1="276" y1="235" x2="357" y2="235" stroke="#c084fc" stroke-width="4" stroke-linecap="round" opacity="0.6"/>
  <line x1="276" y1="260" x2="357" y2="260" stroke="#c084fc" stroke-width="4" stroke-linecap="round" opacity="0.6"/>
  <line x1="276" y1="285" x2="330" y2="285" stroke="#c084fc" stroke-width="4" stroke-linecap="round" opacity="0.6"/>
  <!-- AI Sparkle top-right -->
  <g transform="translate(358, 148)">
    <circle cx="0" cy="0" r="22" fill="#1a1a2e" stroke="url(#accent)" stroke-width="2"/>
    <!-- Star shape -->
    <polygon points="0,-13 3,-4 13,-4 5,2 8,12 0,6 -8,12 -5,2 -13,-4 -3,-4" fill="url(#accent)" opacity="0.9"/>
  </g>
</svg>
